name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Go vet
        run: go vet ./...

      - name: Run tests
        run: go test -count=1 ./...

      - name: Run race tests
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./infrastructure/apikey ./ui/rest/middleware
